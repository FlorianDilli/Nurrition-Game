<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nutrition Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Home -->
        <section id="screen-home" class="screen">
            <div class="container">
                <h1>Nutrition Game</h1>
                <p class="subtitle">Learn nutrition through relative comparison</p>
                <button id="btn-start" class="btn-primary">Start</button>
            </div>
        </section>

        <!-- Nutrient Selection -->
        <section id="screen-nutrient" class="screen hidden">
            <div class="container">
                <h2>Choose a nutrient</h2>
                <p class="instructions">Select one nutrient for this session.</p>
                <div class="card-grid">
                    <button class="card" data-nutrient="calories">Calories</button>
                    <button class="card" data-nutrient="protein">Protein</button>
                    <button class="card" data-nutrient="carbs">Carbohydrates</button>
                    <button class="card" data-nutrient="fat">Fat</button>
                </div>
                <button class="btn-text" id="btn-back-nutrient">Back</button>
            </div>
        </section>

        <!-- Category Selection -->
        <section id="screen-category" class="screen hidden">
            <div class="container">
                <h2>Choose a category</h2>
                <p class="instructions">Which foods do you want to play with?</p>
                <div class="card-grid" id="category-grid"></div>
                <button class="btn-text" id="btn-back-category">Back</button>
            </div>
        </section>

        <!-- Gameplay -->
        <section id="screen-game" class="screen hidden">
            <div class="container">
                <div id="lives-bar">
                    <span id="lives-count">4</span>
                    <span class="hearts" id="hearts"></span>
                </div>
                <div class="round-info">Round <span id="round-number">0</span></div>
                <div id="list-container"></div>
                <div id="new-food-area" class="new-food-card">
                    <div id="new-food-label">New food</div>
                    <div id="new-food-name" class="food-name"></div>
                </div>
                <div id="positions-area">
                    <p class="position-hint">Choose a position:</p>
                    <div id="position-buttons" class="positions-row"></div>
                </div>
                <div id="feedback-area" class="feedback hidden">
                    <div id="feedback-title" class="feedback-title"></div>
                    <div id="feedback-details" class="feedback-details"></div>
                </div>
                <button id="btn-next" class="btn-primary hidden">Next Round</button>
            </div>
        </section>

        <!-- Game Over -->
        <section id="screen-gameover" class="screen hidden">
            <div class="container">
                <h2>Game Over</h2>
                <p id="gameover-message"></p>
                <button id="btn-restart" class="btn-primary">Play Again</button>
            </div>
        </section>
    </div>

    <script src="app.js?v=3"></script>
</body>
</html>
